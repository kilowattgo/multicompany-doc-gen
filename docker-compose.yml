version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: doc-gen-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: doc_generator
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc-gen-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://admin:securepassword123@db:5432/doc_generator?schema=public
      - PORT=3001
    ports:
      - "3001:3001"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: doc-gen-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
